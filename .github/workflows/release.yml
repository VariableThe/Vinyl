name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Required for the tag action to see history
    
    - name: Bump version and push tag
      id: tag_version
      uses: mathieudutour/github-tag-action@v6.2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build App
      run: make app VERSION=${{ steps.tag_version.outputs.new_version }}
      
    - name: Zip App
      run: zip -r Vinyl.zip Vinyl.app
      
    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.tag_version.outputs.new_tag }}
        files: Vinyl.zip

    - name: Checkout tap
      uses: actions/checkout@v4
      with:
        repository: VariableThe/homebrew-tap
        token: ${{ secrets.TAP_GITHUB_TOKEN }}
        path: homebrew-tap

    - name: Update Homebrew tap
      run: |
        cd homebrew-tap
        # Calculate SHA256 of the new zip
        SHA256=$(shasum -a 256 ../Vinyl.zip | awk '{print $1}')
        VERSION="${{ steps.tag_version.outputs.new_version }}"
        
        # Update version and sha256 in the Cask
        sed -i '' "s/version \".*\"/version \"$VERSION\"/g" Casks/vinyl.rb
        sed -i '' "s/sha256 \".*\"/sha256 \"$SHA256\"/g" Casks/vinyl.rb
        
        # Commit and push
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add Casks/vinyl.rb
        git commit -m "Bump Vinyl to v$VERSION"
        git push
