name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Required for the tag action to see history
    
    - name: Bump version and push tag
      id: tag_version
      uses: mathieudutour/github-tag-action@v6.2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build App
      run: make app VERSION=${{ steps.tag_version.outputs.new_version }}
      
    - name: Zip App
      run: zip -r Vinyl.zip Vinyl.app
      
    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        tag_name: ${{ steps.tag_version.outputs.new_tag }}
        files: Vinyl.zip

    - name: Update Homebrew tap
      uses: mislav/bump-homebrew-formula-action@v3
      with:
        formula-name: vinyl
        homebrew-tap: VariableThe/homebrew-tap
        download-url: https://github.com/VariableThe/Vinyl/releases/download/${{ steps.tag_version.outputs.new_tag }}/Vinyl.zip
      env:
        COMMITTER_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
